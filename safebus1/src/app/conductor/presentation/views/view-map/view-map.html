<div class="map-root">
  <div class="map-area">
    <div id="conductor-map" class="leaflet-host"></div>
  </div>
  <div class="map-stats">
    <div class="stat-block">
      <span class="sb-label">TIEMPO TOTAL</span>
      <span class="stat-val mono">{{ tiempoStr() }}</span>
    </div>
    <div class="stat-block">
      <span class="sb-label">DISTANCIA</span>
      <span class="stat-val accent">{{ distancia() | number:'1.1-1' }} KM</span>
    </div>
    <button class="sb-btn-outline back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon> VOLVER
    </button>
  </div>
</div>
