<div class="map-root">
  <div class="map-area">
    <iframe
      src="https://www.openstreetmap.org/export/embed.html?bbox=-77.0700,-12.1200,-76.9400,-12.0200&layer=mapnik&marker=-12.0464,-77.0428"
      width="100%" height="100%"
      style="border:none; filter:brightness(0.75) saturate(0.5);"
      title="Mapa Lima">
    </iframe>
  </div>
  <div class="map-stats">
    <div class="stat-block">
      <span class="sb-label">TIEMPO TOTAL</span>
      <span class="stat-val mono">{{ tiempoStr() }}</span>
    </div>
    <div class="stat-block">
      <span class="sb-label">DISTANCIA</span>
      <span class="stat-val accent">{{ distancia() | number:'1.1-1' }} KM</span>
    </div>
    <button class="sb-btn-outline back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon> VOLVER
    </button>
  </div>
</div>
